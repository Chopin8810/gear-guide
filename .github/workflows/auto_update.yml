name: Autonomous SEO Engine Update

on:
  schedule:
    - cron: '0 0 * * 1' # 毎週月曜日の0時に実行
  workflow_dispatch:      # 手動実行ボタンも作成

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests lxml

      - name: Run Update Script
        run: python update_pages.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Auto-update: Latest camera accessories [skip ci]" || echo "No changes to commit"
          git push
